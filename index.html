  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: '#050505',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }

  <style>
    body {
      background-color: #050505;
      color: white;
      overflow-x: hidden;
    }

    /* Hide scrollbar for cleaner look */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #050505;
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 4px;
    }

    /* Noise Texture Overlay */
    .bg-noise {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
      opacity: 0.03;
      filter: contrast(300%) brightness(100%);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='1'/%3E%3C/svg%3E");
    }

    /* Fast fade-in animation */
    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .animate-fadeIn {
      animation: fadeIn 0.1s ease-out forwards;
    }

    /* GPU-accelerated grayscale */
    .grayscale {
      filter: grayscale(100%);
    }

    /* Hide scrollbar utility */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Orbital Timeline Animations */
    @keyframes orbital-pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    @keyframes orbital-ping {

      75%,
      100% {
        transform: scale(2);
        opacity: 0;
      }
    }

    .animate-pulse {
      animation: orbital-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    .animate-ping {
      animation: orbital-ping 1s cubic-bezier(0, 0, 0.2, 1) infinite;
    }

    .backdrop-blur-lg {
      backdrop-filter: blur(16px);
    }

    .backdrop-blur-xl {
      backdrop-filter: blur(24px);
    }

    @media (prefers-reduced-motion: reduce) {

      .animate-pulse,
      .animate-ping {
        animation: none !important;
      }

      html,
      body {
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>

<body>
  <div id="root" style="position: relative; z-index: 10;"></div>
  <div class="bg-noise"></div>
  <script type="module" src="/index.tsx"></script>
</body>
